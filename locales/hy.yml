    description: AI-աջակցությամբ MVP մշակում ստարտափ հիմնադիրների համար։ Փաթեթներ սկսած $20,000-ից, ելակետային կոդի 100% սեփականություն, QA և թողարկումից հետո աջակցություն՝ ներառված։
    cta: MVP փաթեթներ և գներ

mvp:
  meta:
    title: "AI MVP մշակում — ֆիքսված գին $20k–$50k, 4–8 շաբաթ | Relux Works"
    description: "MVP մշակում ֆիքսված գնով ստարտափ հիմնադիրների համար. փաթեթներ $20k, $35k և $50k, ժամկետ՝ 4–8 շաբաթ, IP-ի և ելակետային կոդի 100% սեփականություն, QA, անվտանգության ստուգում և թողարկումից հետո 30 օր աջակցություն."
  hero:
    badge: AI MVP ստուդիա
    title: AI MVP մշակում ստարտափ հիմնադիրների համար
    subtitle: Ֆիքսված գին։ 4–8 շաբաթ՝ մեկնարկից մինչև թողարկում։ Ելակետային կոդի 100%-ը ձերն է։
    intro: Relux Works-ը AI-native մշակման ստուդիա է՝ vibe coding գործակալություն, որտեղ senior ինժեներները աշխատում են Claude Code-ի և Cursor-ի հետ։ AI-աջակցությամբ մշակումը տալիս է գործակալության որակ ստարտափի արագությամբ — production կոդ, ոչ թե no-code նախատիպ։
    cta_primary: Ստանալ ֆիքսված գնառաջարկ
    cta_secondary: Դիտել գները
  pricing:
    title: MVP գներ — ֆիքսված փաթեթներ
    subtitle: Թափանցիկ ֆիքսված գնագոյացում։ Առանց ժամավճարի, առանց scope creep-ի, առանց անակնկալների։
    per_project: ֆիքսված գին
    featured: Ամենապահանջվածը
    sprint:
      name: MVP Sprint
      price: "$20,000"
      duration: 4 շաբաթ
      description: Հիմնական գաղափարի արագ վալիդացիա։ Մեկ պլատֆորմ՝ վեբ (Next.js) կամ iOS (Swift)։
      f1: Հիմնական user flow + նույնականացում
      f2: Մեկ AI ֆունկցիա (Claude API կամ նմանատիպ)
      f3: Վճարումներին պատրաստ ճարտարապետություն (Stripe)
      f4: QA, անվտանգության ստուգում, deploy
    standard:
      name: MVP Standard
      price: "$35,000"
      duration: 6 շաբաթ
      description: Լիարժեք պրոդուկտ առաջին վճարող օգտատերերի համար։ Վեբ կամ մոբայլ՝ ադմին վահանակով և անալիտիկայով։
      f1: Ամեն ինչ MVP Sprint-ից
      f2: Վճարումներ, բաժանորդագրություններ և billing
      f3: Ադմին վահանակ + պրոդուկտ անալիտիկա
      f4: Ինտեգրացիաներ (CRM, email, webhooks)
    plus:
      name: MVP Plus
      price: "$50,000"
      duration: 8 շաբաթ
      description: Վեբ + մոբայլ միասին, կամ ավելի խորը AI պրոդուկտ՝ ագենտային workflow-ներով։
      f1: Ամեն ինչ MVP Standard-ից
      f2: Վեբ + iOS, կամ բարդ AI ագենտային pipeline-ներ
      f3: Ընդլայնված անվտանգության ստուգում և load testing
      f4: Թողարկումից հետո 60 օր աջակցություն
    note: Յուրաքանչյուր փաթեթ ներառում է IP-ի և ելակետային կոդի 100% սեփականություն, QA, անվտանգության ստուգում և թողարկումից հետո աջակցություն։ Ավելի մեծ scope. դա էլ կգնահատենք ֆիքսված։
  included:
    title: Ինչ է ներառված յուրաքանչյուր փաթեթում
    i1:
      title: IP-ի և ելակետային կոդի 100% սեփականություն
      description: Ամբողջ կոդը առաջին օրվանից ձեր GitHub կազմակերպությունում է։ IP-ի լիարժեք փոխանցում պայմանագրով — առանց լիցենզիաների, առանց lock-in-ի։
    i2:
      title: QA և ավտոմատ թեստավորում
      description: Թեստային փաթեթներ, CI pipeline-ներ և ձեռքով QA՝ յուրաքանչյուր release-ից առաջ։
    i3:
      title: Անվտանգության ստուգում
      description: Secrets management, dependency audit և OWASP-ի վրա հիմնված անվտանգության checklist՝ թողարկումից առաջ։
    i4:
      title: Թողարկումից հետո աջակցություն
      description: Թողարկումից հետո 30 օր bug fix-եր և կայունացում՝ ներառված (MVP Plus-ում՝ 60 օր)։
    i5:
      title: Շաբաթական դեմոներ
      description: Աշխատող build՝ ամեն շաբաթ։ Տեսնում եք առաջընթացը, ոչ թե ստատուս-հաշվետվությունները։
    i6:
      title: Թողարկում և deploy
      description: App Store հրապարակում կամ production վեբ deploy — ներառված է, ոչ թե հավելավճարով։
  process:
    title: Գաղափարից մինչև թողարկում 4–8 շաբաթում
    w1:
      title: Շաբաթ 1 — scope և ճարտարապետություն
      description: Ձեր գաղափարը վերածում ենք ֆիքսված scope-ի — user flow-ներ, տվյալների մոդել, ճարտարապետություն և շաբաթական պլան, որը դուք հաստատում եք։
    w2:
      title: Շաբաթներ 2–3 — մշակում
      description: Senior ինժեներները կառուցում են AI-աջակցությամբ (Claude Code, Cursor)։ Աշխատող ծրագիր՝ ամեն շաբաթվա դեմոյին։
    w3:
      title: Շաբաթներ 4–6 — ինտեգրացիա և կայունացում
      description: Վճարումներ, AI ֆունկցիաներ, ինտեգրացիաներ։ QA, անվտանգության ստուգում, performance օպտիմիզացիա։
    w4:
      title: Թողարկում — և ևս 30 օր
      description: App Store կամ production deploy, մոնիթորինգ և 30 օր ներառված աջակցություն թողարկումից հետո։
  stack:
    title: "Մշակման ոճ. AI-assisted, production մակարդակ"
    description: Մենք vibe coding ստուդիա ենք բառացի իմաստով — Claude Code-ը և Cursor-ը թիմի մաս են, իսկ senior ինժեներները ստուգում են ամեն տող։ Ստանում եք AI մշակման արագությունը production կոդի որակով — type-safe Swift iOS-ի համար, Next.js/TypeScript վեբի համար, Claude API՝ AI ֆունկցիաների համար։ Առանց no-code lock-in-ի — կոդ, որի համար ձեր ապագա թիմը շնորհակալ կլինի։
    t1: Claude Code
    t2: Cursor
    t3: Swift / iOS
    t4: Next.js / TypeScript
    t5: Claude API
    t6: PostgreSQL / Supabase
  faq:
    title: Հաճախ տրվող հարցեր
    q1:
      q: Որքա՞ն արժե MVP մշակումը Relux Works-ում։
      a: Աշխատում ենք ֆիքսված փաթեթներով — MVP Sprint՝ $20,000 (4 շաբաթ), MVP Standard՝ $35,000 (6 շաբաթ) և MVP Plus՝ $50,000 (8 շաբաթ)։ Գինը համաձայնեցվում է մինչև մեկնարկը և չի փոխվում, քանի դեռ scope-ը չի փոխվում։
    q2:
      q: Որքա՞ն ժամանակ է պահանջվում MVP կառուցելու համար։
      a: 4–8 շաբաթ՝ կախված փաթեթից։ Առաջին շաբաթը scope-ն ու ճարտարապետությունն են, այնուհետև շաբաթական աշխատող դեմոներ մինչև թողարկում։ Հենց AI-աջակցությամբ մշակումն է դարձնում այս ժամկետները իրատեսական՝ առանց որակի զիջումների։
    q3:
      q: Ո՞ւմ են պատկանում ելակետային կոդը և IP-ն։
      a: Ձեզ — 100%-ով։ Repository-ն ստեղծվում է ձեր GitHub կազմակերպությունում առաջին օրը, պայմանագիրը ձեզ է փոխանցում IP-ի բոլոր իրավունքները։ Առանց հետադարձ լիցենզիաների, առանց vendor lock-in-ի։
    q4:
      q: Ի՞նչ է նշանակում «vibe coding» կամ AI-աջակցությամբ մշակում գործնականում։
      a: Մեր ինժեներները աշխատում են Claude Code-ի և Cursor-ի հետ — AI ագենտները գրում են կոդի զգալի մասը, իսկ senior ինժեներները նախագծում են ճարտարապետությունը և ստուգում ամեն ինչ։ Այսպես ենք մատուցում գործակալության մակարդակի MVP-ներ՝ դասական թիմերից մի քանի անգամ արագ։
    q5:
      q: Սա no-code է (Bubble, Lovable), թե՞ իրական production կոդ։
      a: Իրական production կոդ — Swift iOS-ի համար, Next.js/TypeScript վեբի համար։ No-code գործիքները լավ են նախատիպերի համար, բայց արագ բախվում են մասշտաբավորման և սեփականության սահմանափակումներին։ Ստանում եք կոդ, որը ձեր ապագա թիմը կվերցնի ուղղակիորեն։
    q6:
      q: Ի՞նչ է լինում թողարկումից հետո։
      a: Յուրաքանչյուր փաթեթ ներառում է թողարկումից հետո աջակցություն — 30 օր bug fix-եր և կայունացում (MVP Plus-ում՝ 60 օր)։ Այնուհետև հաճախորդների մեծ մասը անցնում է ամսական retainer-ի կամ կոդը հանձնում իր թիմին — այն լիովին փաստաթղթավորված է և ձերն է։
    q7:
      q: Ինչպե՞ս եք կազմակերպում QA-ն և անվտանգությունը։
      a: Յուրաքանչյուր փաթեթում՝ ավտոմատ թեստեր, CI և ձեռքով QA։ Թողարկումից առաջ անցկացնում ենք անվտանգության ստուգում — secrets management, dependency audit և OWASP-ի վրա հիմնված checklist։ MVP Plus-ն ավելացնում է ընդլայնված ստուգում և load testing։
    q8:
      q: Ես ոչ տեխնիկական հիմնադիր եմ։ Կարո՞ղ եմ աշխատել ձեզ հետ։
      a: Այո — մեր հաճախորդների մեծ մասը ոչ տեխնիկական հիմնադիրներ են։ Առաջին շաբաթը ձեր գաղափարը պարզ լեզվով վերածում է կոնկրետ scope-ի, իսկ շաբաթական դեմոները թույլ են տալիս վերահսկել ընթացքը՝ առանց կոդ կարդալու։
    q9:
      q: Իսկ եթե պահանջները փոխվեն նախագծի ընթացքում։
      a: Փոքր ճշգրտումները ներառվում են ֆիքսված scope-ում։ Մեծ փոփոխությունները ձևակերպվում են թափանցիկ, ֆիքսված գնով change request-ով — համաձայնեցվում է մինչև իրականացումը, բյուջեն անակնկալներ չի մատուցում։
    q10:
      q: Որտե՞ղ եք գտնվում և աշխատո՞ւմ եք միջազգային հաճախորդների հետ։
      a: Relux Works ՍՊԸ-ն գրանցված է Հայաստանում և հեռավար աշխատում է հիմնադիրների հետ ամբողջ աշխարհում — ԱՄՆ, ԵՄ և ոչ միայն։ Պայմանագրերը՝ անգլերեն, invoice-ները՝ USD, async հաղորդակցություն։
