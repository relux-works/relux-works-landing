    s2: AI ასისტენტი დღეები ერთსა და იმავე ბაგს ტრიალებს და ვერ ასწორებს.
    s3: დემოზე მუშაობდა, რეალურ მომხმარებლებსა და მონაცემებზე — დაიშალა.
    s4: API გასაღებები გარეთაა, წვდომის შემოწმებები არ არსებობს — უსაფრთხოება არ დაპროექტებულა, ის უბრალოდ „მოხდა".
    s5: სცადეთ დეველოპერის დაქირავება — მან ამ კოდის ჩაბარებაზე უარი თქვა.
  services:
    title: რას ვაკეთებთ
    audit:
      title: Rescue აუდიტი
      description: ერთი კვირა, ფიქსირებული ფასი. სრული სურათი, სანამ ვინმე კოდს შეეხება.
      f1: არქიტექტურის, უსაფრთხოების, წარმადობისა და ტესტური დაფარვის რევიუ
      f2: პრიორიტეტიზებული გეგმა — რა არის კრიტიკული, რა მოიცდის, რა გადასაწერია
      f3: გულწრფელი ვერდიქტი — სტაბილიზაცია, ეტაპობრივი რეფაქტორინგი თუ თავიდან აწყობა (და რა ღირს თითოეული)
    bugs:
      title: რთული ბაგების გასწორება
      description: ვიღებთ ბაგებს, რომლებზეც AI ინსტრუმენტებმა დანებდნენ.
      f1: Race condition-ები, state-ის გაფუჭება, მონაცემთა მთლიანობა, გატეხილი ინტეგრაციები
      f2: აღვადგენთ, ვაიზოლირებთ, ვასწორებთ — რეგრესიული ტესტით, რომ აღარ დაბრუნდეს
      f3: Production ინციდენტების მხარდაჭერა, როცა ყველაფერი იწვის
    refactor:
      title: De-vibe-coding (რეფაქტორინგი production-მდე)
      description: ეტაპობრივი მიგრაცია არქიტექტურაზე, რომელიც რეალურ ბიზნესს გაუძლებს.
      f1: ჯერ ტესტები მიმდინარე ქცევის გარშემო — არაფერი ტყდება ჩუმად
      f2: Type-safe მოდულარული არქიტექტურა, CI/CD, observability, secrets-ის ჰიგიენა
      f3: თქვენი როადმაპი მიგრაციის დროსაც აგრძელებს გამოშვებას
    rails:
      title: აგენტური რელსები
      description: ვინარჩუნებთ AI-ის სიჩქარეს — ვამატებთ საინჟინრო დისციპლინას.
      f1: Claude Code workflow ტესტებითა და CI gate-ებით
      f2: Senior ინჟინრების რევიუ ყველა ცვლილებაზე
      f3: გადაბარება თქვენს გუნდს — ან ჩვენ ვაგრძელებთ მართვას (იხ. ფაბლიშინგი)
  pricing:
    title: ფასები
    subtitle: აუდიტი ფიქსირებული ფასია. დანარჩენი ყველაფერი აუდიტის შედეგებით ფიქსირებულად ფასდება, უსასრულო საათობრივი ბილინგის გარეშე.
    audit:
      name: Rescue აუდიტი
      price: "$3,000"
      duration: 1 კვირა
      description: კოდის სრული ანგარიში + პრიორიტეტიზებული გეგმა + გულწრფელი ვერდიქტი „რეფაქტორინგი თუ თავიდან აწყობა".
    sprint:
      name: სტაბილიზაციის სპრინტი
      price: $10,000-დან
      duration: 2–3 კვირა
      description: გასწორებული კრიტიკული ბაგები, დახურული უსაფრთხოების ხვრელები, ტესტები ძირითადი flow-ების გარშემო.
    full:
      name: სრული de-vibe-coding
      price: ფიქსირებული ფასი აუდიტის შემდეგ
      duration: ჩვეულებრივ $15k–40k
      description: მიგრაცია production არქიტექტურაზე + აგენტური რელსები, სანამ პროდუქტი გამოშვებას აგრძელებს.
    note: აუდიტის ღირებულება შემდგომ სამუშაოში ითვლება. თუ გულწრფელი პასუხია „იაფია თავიდან აწყობა" — ასე ვიტყვით და ჩვენს ფიქსირებულ MVP პაკეტებს შემოგთავაზებთ.
  process:
    title: როგორ მიმდინარეობს გადარჩენა
    w1:
      title: აუდიტი — კვირა 1
      description: ვკითხულობთ კოდს, ვუშვებთ აპლიკაციას, ვხაზავთ არქიტექტურას, ვასკანერებთ უსაფრთხოებას და ვაბარებთ ანგარიშს პრიორიტეტიზებული გეგმით.
    w2:
      title: სტაბილიზაცია
      description: ჯერ კრიტიკული ბაგები და უსაფრთხოების ხვრელები, ტესტები იმ ქცევის გარშემო, რომელსაც მომხმარებლები ეყრდნობიან. სისხლდენა აქ ჩერდება.
    w3:
      title: რეფაქტორინგი
      description: ეტაპობრივი de-vibe-coding — მოდული მოდულის მიყოლებით, ტესტების ქვეშ, ფიჩების როადმაპის გაყინვის გარეშე.
    w4:
      title: რელსები და გადაბარება
      description: გამართული აგენტური workflow (Claude Code + senior რევიუ), დაწერილი დოკუმენტაცია, გუნდის onboarding — ან ჩვენ ვაგრძელებთ მართვას.
  faq:
    title: ხშირად დასმული კითხვები
    q1:
      q: გაასწორებთ აპლიკაციას, რომელიც Lovable-ში, Bolt-ში, Cursor-ში ან v0-ში აიწყო?
      a: დიახ — სწორედ ეს არის vibe-code rescue. ვმუშაობთ AI ბილდერების ტიპურ შედეგთან (Next.js/React, Node, Python, Supabase, Firebase) და ნეიტივ iOS/Swift-თანაც — ვიბარებთ repository-ს და production ხარისხამდე მიგვყავს.
    q2:
      q: AI ციკლში გაიჭედა და ჩემს ბაგს ვერ ასწორებს. თქვენ შეძლებთ?
      a: დიახ. რთული ბაგების გასწორება ამ სერვისის ბირთვია — race condition-ები, state-ის გაფუჭება, მონაცემთა მთლიანობა, გატეხილი ინტეგრაციები. Senior ინჟინრები ბაგს აღადგენენ, მიზეზს აიზოლირებენ, ასწორებენ და რეგრესიული ტესტით ამაგრებენ. AI ინსტრუმენტები იმიტომ ციკლავენ, რომ სიმპტომებს კერავენ — ჩვენ მიზეზებს ვადებაგებთ.
    q3:
      q: ყველაფერს ნულიდან გადაწერთ?
      a: ნაგულისხმევად — არა. მიმდინარე ქცევას ტესტებით ვფარავთ და ეტაპობრივად ვარეფაქტორებთ — ეს იაფი და ნაკლებრისკიანია. თუ აუდიტი აჩვენებს, რომ თავიდან აწყობა მართლა იაფია, პირდაპირ ვიტყვით და ფიქსირებულ ფასს შემოგთავაზებთ. ნებისმიერ შემთხვევაში გულწრფელ მათემატიკას იღებთ.
    q4:
      q: შეგვიძლია გაწმენდის დროს ფიჩების გამოშვება გავაგრძელოთ?
      a: დიახ — ეს ჩვენი პროცესის კონსტრუქციული შეზღუდვაა. სტაბილიზაცია და რეფაქტორინგი მოდული მოდულის მიყოლებით მიდის ტესტების ქვეშ, სანამ თქვენი ფიჩების როადმაპი წინ მიიწევს.
    q5:
      q: რა ღირს vibe-coded აპლიკაციის გასწორება?
      a: Rescue აუდიტი — $3,000, ერთი კვირა. სტაბილიზაციის სპრინტი — $10,000-დან. სრული de-vibe-coding მიგრაცია ფიქსირებულად ფასდება აუდიტის შემდეგ — ჩვეულებრივ $15,000–40,000, კოდის ზომისა და მდგომარეობის მიხედვით. აუდიტის ღირებულება შემდგომ სამუშაოში ითვლება.
    q6:
      q: AI კოდი მართლა დაუცველია?
      a: ხშირად — დიახ. ტიპური აღმოჩენები — API გასაღებები repository-ში ან კლიენტის მხარეს, endpoint-ებზე ავტორიზაციის შემოწმებების არარსებობა, injection-ისადმი მოწყვლადი მოთხოვნები, PII ლოგებში, ღია CORS. აუდიტი მოიცავს უსაფრთხოების რევიუს OWASP-ზე დაფუძნებული checklist-ით, სტაბილიზაციის სპრინტი კი კრიტიკულ ხვრელებს ხურავს.
    q7:
      q: რას ვიღებთ ბოლოს?
      a: კოდს ტესტებით, CI/CD-ით, დოკუმენტაციითა და type-safe მოდულარული არქიტექტურით — პლუს აგენტური რელსები, რომ AI დეველოპმენტმა სიჩქარე საინჟინრო დისციპლინით შეინარჩუნოს. კოდის 100% თქვენია — გადავაბარებთ თქვენს გუნდს ან retainer-ით გავაგრძელებთ მართვას.
    q8:
      q: რა არის „აგენტური რელსები"?
      a: სტრუქტურირებული AI workflow — Claude Code ტესტების, CI gate-ებისა და senior ინჟინრების რევიუს შიგნით. იგივე სიჩქარე, რომელმაც თქვენი პროტოტიპი ააწყო, იმ ქაოსის გარეშე, რომელმაც ის გატეხა.
    q9:
      q: ხელს აწერთ NDA-ს და როგორ იღებთ კოდზე წვდომას?
      a: დიახ, NDA-ს ვაწერთ ხელს. წვდომა თქვენი repository-ის გავლით, მინიმალური უფლებებით. კოდი თქვენს საკუთრებას არ ტოვებს — ყველაფერი, რასაც ვწერთ, პირველი დღიდან თქვენს repo-შია.
  cta:
    title: გამოგვიგზავნეთ კოდი
    description: მოგვეცით repository-ზე წვდომა (ან უბრალოდ აღწერეთ სიმპტომები) — ერთ სამუშაო დღეში გიპასუხებთ აუდიტის სლოტითა და ფიქსირებული ფასით.
    button: მისწერეთ ivan@relux.works-ს

