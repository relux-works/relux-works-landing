    i2:
      title: QA и автотесты
      description: Тестовые сьюты, CI-пайплайны и ручной QA перед каждым релизом.
    i3:
      title: Security-ревью
      description: Управление секретами, аудит зависимостей и чек-лист по OWASP перед запуском.
    i4:
      title: Поддержка после запуска
      description: 30 дней фиксов и стабилизации после запуска включены (60 дней в MVP Plus).
    i5:
      title: Еженедельные демо
      description: Рабочий билд каждую неделю. Вы видите прогресс, а не статус-репорты.
    i6:
      title: Запуск и деплой
      description: Публикация в App Store или production-деплой веба — включено, а не за доплату.
  process:
    title: От идеи до запуска за 4–8 недель
    w1:
      title: Неделя 1 — скоуп и архитектура
      description: Превращаем идею в фиксированный скоуп — пользовательские флоу, модель данных, архитектура и понедельный план, который вы утверждаете.
    w2:
      title: Недели 2–3 — разработка
      description: Senior-инженеры строят продукт с AI-разработкой (Claude Code, Cursor). Рабочий софт на демо каждую неделю.
    w3:
      title: Недели 4–6 — интеграции и стабилизация
      description: Платежи, AI-фичи, интеграции. QA, security-ревью, оптимизация производительности.
    w4:
      title: Запуск — и ещё 30 дней
      description: App Store или production-деплой, мониторинг и 30 дней включённой поддержки после запуска.
  stack:
    title: "Стиль разработки: AI-assisted, production-уровень"
    description: Мы vibe coding студия в буквальном смысле — Claude Code и Cursor часть команды, а senior-инженеры ревьюят каждую строку. Вы получаете скорость AI-разработки и качество production-кода — типобезопасный Swift для iOS, Next.js/TypeScript для веба, Claude API для AI-фич. Без no-code lock-in — кодовая база, за которую ваша будущая команда скажет спасибо.
    t1: Claude Code
    t2: Cursor
    t3: Swift / iOS
    t4: Next.js / TypeScript
    t5: Claude API
    t6: PostgreSQL / Supabase
  faq:
    title: Частые вопросы
    q1:
      q: Сколько стоит разработка MVP в Relux Works?
      a: Мы работаем по фиксированным пакетам — MVP Sprint за $20,000 (4 недели), MVP Standard за $35,000 (6 недель) и MVP Plus за $50,000 (8 недель). Цена согласуется до старта и не меняется, пока не меняется скоуп.
    q2:
      q: Сколько времени занимает разработка MVP?
      a: От 4 до 8 недель в зависимости от пакета. Первая неделя — скоуп и архитектура, дальше еженедельные рабочие демо до самого запуска. Именно AI-разработка делает такие сроки реальными без срезания углов.
    q3:
      q: Кому принадлежат исходный код и IP?
      a: Вам — на 100%. Репозиторий создаётся в вашей GitHub-организации с первого дня, договор передаёт вам все права на IP. Без обратных лицензий и vendor lock-in.
    q4:
      q: Что на практике значит «vibe coding» и AI-разработка?
      a: Наши инженеры работают с Claude Code и Cursor — AI-агенты пишут значительную часть кода, а senior-инженеры проектируют архитектуру и ревьюят всё. Так мы делаем MVP уровня агентства в разы быстрее классических команд.
    q5:
      q: Это no-code вроде Bubble или Lovable — или настоящий production-код?
      a: Настоящий production-код — Swift для iOS, Next.js/TypeScript для веба. No-code хорош для прототипов, но быстро упирается в масштабирование и владение кодом. Вы получаете кодовую базу, которую ваша будущая команда заберёт напрямую.
    q6:
      q: Что происходит после запуска?
      a: Каждый пакет включает поддержку после запуска — 30 дней фиксов и стабилизации (60 дней в MVP Plus). Дальше большинство клиентов переходят на месячный ретейнер для итераций или передают кодовую базу своей команде — она полностью документирована и принадлежит вам.
    q7:
      q: Как устроены QA и безопасность?
      a: В каждом пакете — автотесты, CI и ручной QA. Перед запуском проводим security-ревью — управление секретами, аудит зависимостей и чек-лист по OWASP. В MVP Plus добавляются расширенное security-ревью и нагрузочное тестирование.
    q8:
      q: Я нетехнический фаундер. Получится ли работать с вами?
      a: Да — большинство наших клиентов нетехнические фаундеры. Первая неделя переводит идею в конкретный скоуп простым языком, а еженедельные демо держат вас в курсе без чтения кода.
    q9:
      q: Что если требования изменятся посреди проекта?
      a: Небольшие правки поглощаются фиксированным скоупом. Крупные изменения оформляются прозрачным change request с фиксированной ценой — согласуем до реализации, бюджет не преподносит сюрпризов.
    q10:
      q: Где вы находитесь и работаете ли с международными клиентами?
      a: Relux Works LLC зарегистрирована в Армении и работает удалённо с фаундерами по всему миру — США, ЕС и не только. Договоры на английском, инвойсы в USD, async-коммуникация.
  cta:
    title: Расскажите, что вы строите
    description: Пришлите пару абзацев о вашей идее — ответим в течение рабочего дня с рекомендованным пакетом и фиксированной сметой.
    button: Написать на ivan@relux.works

publishing:
  meta:
    title: "Паблишинг и масштабирование под ключ — App Store, Google Play, платежи | Relux Works"
    description: "Берём на себя весь паблишинг — аккаунты App Store и Google Play, прохождение ревью, банки и выплаты, техническое руководство (fractional CTO), спасение vibe-coded проектов (Lovable, Cursor, Bolt) и масштабирование инфраструктуры на сотни тысяч пользователей."
  hero:
    badge: Студия полного цикла
    title: Публикуем, оперируем и масштабируем ваше приложение
    subtitle: Аккаунты App Store и Google Play, платежи и выплаты, техническое руководство и масштабируемая инфраструктура — всё на нас.
    intro: "Выпустить MVP — половина дела. Вторая половина — операционка: аккаунты разработчика, ревью в сторах, банковские рельсы и выплаты, мониторинг, масштабирование и senior-человек, отвечающий за технический роадмап. Relux Works берёт на себя все обязанности паблишинга, чтобы фаундер занимался продуктом и ростом."
    cta_primary: Обсудить проект
  offers:
    title: Что мы берём на себя
    accounts:
      title: Публикация в App Store и Google Play
      description: Настраиваем и ведём весь релизный конвейер — под вашими аккаунтами или нашими.
      f1: Настройка Apple Developer и Google Play Console (DUNS, верификация компании)
      f2: Сабмиты на ревью, работа с реджектами, expedited review
      f3: Релизы, поэтапные раскатки, TestFlight и внутренние треки
      f4: Карточки в сторах, скриншоты, базовый ASO
    payments:
      title: Платежи, банки и выплаты
      description: Денежные потоки настроены от и до — от чекаута до вашего банковского счёта.
      f1: Stripe / Paddle, подписки и биллинг
      f2: Настройка выплат App Store и Google Play, банковские реквизиты и налоговые формы
      f3: Инвойсинг и отчётность по выручке
      f4: Публикация под нашим юрлицом с договорной передачей выручки — если своё юрлицо заводить пока рано
    rescue:
      title: Спасение vibe-coded проектов и агентские рельсы
      description: Собрали прототип в Lovable, Cursor, Bolt или v0? Забираем его и доводим до production-уровня.
      f1: Сначала аудит кодовой базы и тесты вокруг текущего поведения
      f2: Перевод на масштабируемую архитектуру — типобезопасную, модульную, документированную
      f3: Агентские рельсы разработки — Claude Code-воркфлоу с ревью senior-инженеров
      f4: Ваш роадмап продолжает ехать во время миграции
    scale:
      title: Техническое руководство и масштабирование
      description: Senior-команда, которая отвечает за архитектуру и инфраструктуру по мере роста.
      f1: Fractional CTO — роадмап, архитектурные решения, помощь с наймом
      f2: Инфраструктура, масштабируемая на сотни тысяч пользователей
      f3: Нагрузочное тестирование, observability, автоскейлинг, контроль затрат
      f4: Безопасность, комплаенс и практики реагирования на инциденты
  faq:
    title: Частые вопросы
    q1:
      q: Можете публиковать приложение под вашими аккаунтами App Store и Google Play?
      a: Да. Две модели — либо заводим ваши собственные Apple Developer и Google Play Console (включая DUNS и верификацию компании) и ведём их за вас, либо публикуем под аккаунтами Relux Works с договором, гарантирующим передачу приложения, данных и выручки вам в любой момент.
    q2:
      q: Берёте ли на себя платежи, банки и выплаты?
      a: Да, целиком. Мерчант-аккаунты (Stripe, Paddle), подписочный биллинг, настройка выплат App Store и Google Play, банковские реквизиты и налоговые формы, инвойсинг и отчётность. Если юрлица у вас ещё нет — можем проводить выручку через наше по прозрачному договору, пока вы не зарегистрируетесь.
    q3:
      q: Приложение написано «вайб-кодингом» в Lovable, Cursor или Bolt. Заберёте его?
      a: Да — это наш сервис vibe-code rescue. Делаем аудит кодовой базы, оборачиваем текущее поведение тестами, затем переводим на масштабируемую типобезопасную архитектуру и агентские рельсы разработки — Claude Code-воркфлоу с ревью senior-инженеров. Продукт продолжает релизиться во время миграции.
    q4:
      q: Сможете масштабировать приложение на сотни тысяч пользователей?
      a: Да. Нагрузочное тестирование, профилирование и перестройка узких мест — стратегия БД и кэширования, автоскейлинг инфраструктуры, observability (логи, метрики, алерты) и контроль затрат, чтобы счёт рос медленнее числа пользователей.
    q5:
      q: Даёте ли постоянное техническое руководство?
      a: Да — fractional CTO. Отвечаем за архитектурные решения, технический роадмап, качество кода и практики безопасности, помогаем собеседовать будущих инхаус-инженеров. Senior-руководство без найма фултайм-CTO.
    q6:
      q: Как это тарифицируется?
      a: Операционка (паблишинг, платежи, руководство, масштабирование) идёт месячным ретейнером под вашу стадию. Разовые проекты — спасение vibe-coded кодовой базы или капитальная перестройка инфраструктуры — оцениваются фиксированной ценой, как и наша разработка MVP.
    q7:
      q: Кому принадлежат аккаунты, код и выручка?
      a: Вам. Аккаунты, заведённые на ваше имя, ваши с первого дня. Если публикуем или проводим выручку через наше юрлицо — договор гарантирует полную передачу приложения, исходного кода, данных и накопленной выручки по запросу.
    q8:
      q: Мы застряли в ревью App Store. Поможете?
      a: Да — реджекты ревью для нас рутина. Диагностируем причину, чиним комплаенс (приватность, entitlements, метаданные), общаемся с App Review и запрашиваем expedited review, когда это оправдано.
  cta:
    title: Передайте нам операционку
    description: Расскажите, где ваш продукт сейчас — прототип, застрял в ревью или падает под нагрузкой. Ответим в течение рабочего дня с планом.
    button: Написать на ivan@relux.works

