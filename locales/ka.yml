  pricing:
    title: "MVP ფასები: ფიქსირებული პაკეტები"
    subtitle: გამჭვირვალე ფიქსირებული ფასები. საათობრივი ბილინგის, scope creep-ისა და სიურპრიზების გარეშე.
    per_project: ფიქსირებული ფასი
    featured: ყველაზე პოპულარული
    sprint:
      name: MVP Sprint
      price: "$20,000"
      duration: 4 კვირა
      description: "ძირითადი იდეის სწრაფი ვალიდაცია ერთ პლატფორმაზე: ვები (Next.js) ან ნეიტივ მობილური (Swift / Kotlin)."
      f1: ძირითადი user flow + ავთენტიფიკაცია
      f2: ერთი AI ფუნქცია (Claude API ან მსგავსი)
      f3: გადახდებისთვის მზა არქიტექტურა (Stripe)
      f4: QA, უსაფრთხოების შემოწმება, deploy
    standard:
      name: MVP Standard
      price: "$35,000"
      duration: 6 კვირა
      description: სრულფასოვანი პროდუქტი პირველი გადამხდელი მომხმარებლებისთვის. ვები ან მობილური, ადმინ პანელით და ანალიტიკით.
      f1: ყველაფერი MVP Sprint-დან
      f2: გადახდები, გამოწერები და billing
      f3: ადმინ პანელი + პროდუქტის ანალიტიკა
      f4: ინტეგრაციები (CRM, email, webhooks)
    plus:
      name: MVP Plus
      price: "$50,000"
      duration: 8 კვირა
      description: ვები + მობილური ერთად, ან უფრო ღრმა AI პროდუქტი აგენტური workflow-ებით.
      f1: ყველაფერი MVP Standard-დან
      f2: ვები + ნეიტივ მობილური, ან რთული AI აგენტური pipeline-ები
      f3: გაფართოებული უსაფრთხოების შემოწმება და load testing
      f4: გაშვების შემდეგ 60 დღის მხარდაჭერა
    note: ყველა პაკეტი მოიცავს IP-ისა და წყარო კოდის 100% საკუთრებას, QA-ს, უსაფრთხოების შემოწმებას და გაშვების შემდგომ მხარდაჭერას. უფრო დიდი scope? მასაც ფიქსირებულად შევაფასებთ.
  included:
    title: რა შედის ყველა პაკეტში
    i1:
      title: IP-ისა და წყარო კოდის 100% საკუთრება
      description: მთელი კოდი პირველი დღიდან თქვენს GitHub ორგანიზაციაშია. IP-ის სრული გადაცემა ხელშეკრულებით, ლიცენზიებისა და lock-in-ის გარეშე.
    i2:
      title: QA და ავტომატური ტესტირება
      description: სატესტო პაკეტები, CI pipeline-ები და მანუალური QA ყველა რელიზის წინ.
    i3:
      title: უსაფრთხოების შემოწმება
      description: Secrets management, dependency audit და OWASP-ზე დაფუძნებული უსაფრთხოების checklist გაშვების წინ.
    i4:
      title: გაშვების შემდგომი მხარდაჭერა
      description: გაშვების შემდეგ 30 დღის bug fix-ები და სტაბილიზაცია ფასშია (MVP Plus-ში 60 დღე).
    i5:
      title: ყოველკვირეული დემოები
      description: მუშა build ყოველ კვირას. თავად ათვალიერებთ ცოცხალ პროდუქტს და მართავთ შემდეგ სპრინტს.
    i6:
      title: გაშვება და deploy
      description: App Store-ში გამოქვეყნება ან production ვებ deploy ყველა პაკეტის ნაწილია.
  process:
    title: იდეიდან გაშვებამდე 4–8 კვირაში
    w1:
      title: "კვირა 1: scope და არქიტექტურა"
      description: "თქვენს იდეას ვაქცევთ ფიქსირებულ scope-ად: user flow-ები, მონაცემთა მოდელი, არქიტექტურა და ყოველკვირეული გეგმა, რომელსაც თქვენ ამტკიცებთ."
    w2:
      title: "კვირები 2–3: შემუშავება"
      description: Senior ინჟინრები აშენებენ AI-ით მხარდაჭერილი შემუშავებით (Claude Code, Cursor). მუშა პროგრამა ყოველკვირეულ დემოზე.
    w3:
      title: "კვირები 4–6: ინტეგრაცია და გამყარება"
      description: გადახდები, AI ფუნქციები, ინტეგრაციები. QA, უსაფრთხოების შემოწმება, წარმადობის ოპტიმიზაცია.
    w4:
      title: გაშვება და კიდევ 30 დღე
      description: App Store ან production deploy, მონიტორინგი და 30 დღის მხარდაჭერა გაშვების შემდეგ.
  stack:
    title: "შემუშავების სტილი: AI-assisted, production დონე"
    description: "ჩვენ vibe coding სტუდია ვართ პირდაპირი მნიშვნელობით: Claude Code და Cursor გუნდის ნაწილია, ხოლო senior ინჟინრები ამოწმებენ ყველა ხაზს. იღებთ AI შემუშავების სიჩქარეს production კოდის ხარისხით. ძირითადი სტეკი: type-safe Swift iOS-ისთვის, Kotlin Android-ისთვის, React Native კროს-პლატფორმისთვის, Next.js/TypeScript ვებისთვის, Go და Rust backend სერვისებისთვის, Claude API AI ფუნქციებისთვის. შედეგად იღებთ სუფთა კოდბაზას, რომელსაც თქვენი მომავალი გუნდი დაბრკოლების გარეშე გადაიბარებს."
    t1: Claude Code
    t2: Cursor
    t3: Swift / iOS
    t4: Kotlin / Android
    t5: React Native
    t6: Next.js / TypeScript
    t7: Go / Rust
    t8: Claude API
    t9: PostgreSQL / Supabase
  faq:
    title: ხშირად დასმული კითხვები
    q1:
      q: რა ღირს MVP-ის შემუშავება Relux Works-ში?
      a: "ვმუშაობთ ფიქსირებული პაკეტებით: MVP Sprint $20,000 (4 კვირა), MVP Standard $35,000 (6 კვირა) და MVP Plus $50,000 (8 კვირა). ფასი თანხმდება დაწყებამდე და არ იცვლება, სანამ scope არ იცვლება."
    q2:
      q: რამდენი დრო სჭირდება MVP-ის აშენებას?
      a: 4–8 კვირა პაკეტის მიხედვით. პირველი კვირა scope-სა და არქიტექტურას ეთმობა, შემდეგ ყოველკვირეული მუშა დემოები გაშვებამდე. სწორედ AI-ით მხარდაჭერილი შემუშავება ხდის ამ ვადებს რეალისტურს ხარისხის დათმობის გარეშე.
    q3:
      q: ვის ეკუთვნის წყარო კოდი და IP?
      a: თქვენ, 100%-ით. Repository იქმნება თქვენს GitHub ორგანიზაციაში პირველივე დღეს, ხელშეკრულება კი ყველა IP უფლებას თქვენ გადმოგცემთ. უკუ-ლიცენზიებისა და vendor lock-in-ის გარეშე.
    q4:
      q: რას ნიშნავს „vibe coding" ან AI-ით მხარდაჭერილი შემუშავება პრაქტიკაში?
      a: "ჩვენი ინჟინრები მუშაობენ Claude Code-სა და Cursor-თან: AI აგენტები წერენ კოდის დიდ ნაწილს, ხოლო senior ინჟინრები აპროექტებენ არქიტექტურას და ამოწმებენ ყველაფერს. ასე ვაწვდით სააგენტოს დონის MVP-ებს კლასიკურ გუნდებზე რამდენჯერმე სწრაფად."
    q5:
      q: ეს no-code-ია (Bubble, Lovable) თუ ნამდვილი production კოდი?
      a: "ნამდვილი production კოდი: Swift iOS-ისთვის, Kotlin Android-ისთვის, Next.js/TypeScript ვებისთვის. No-code ინსტრუმენტები კარგია პროტოტიპებისთვის, მაგრამ სწრაფად აწყდებიან მასშტაბირებისა და საკუთრების ლიმიტებს. იღებთ კოდს, რომელსაც თქვენი მომავალი გუნდი პირდაპირ გადაიბარებს."
    q6:
      q: რა ხდება გაშვების შემდეგ?
      a: "ყველა პაკეტი მოიცავს გაშვების შემდგომ მხარდაჭერას: 30 დღის bug fix-ები და სტაბილიზაცია (MVP Plus-ში 60 დღე). შემდეგ კლიენტების უმეტესობა გადადის ყოველთვიურ retainer-ზე ან კოდს საკუთარ გუნდს გადასცემს. ის სრულად დოკუმენტირებულია და თქვენია."
    q7:
      q: როგორ აწყობთ QA-სა და უსაფრთხოებას?
      a: "ყველა პაკეტში ავტომატური ტესტები, CI და მანუალური QA. გაშვების წინ ვატარებთ უსაფრთხოების შემოწმებას: secrets management, dependency audit და OWASP-ზე დაფუძნებული checklist. MVP Plus ამატებს გაფართოებულ შემოწმებას და load testing-ს."
    q8:
      q: არატექნიკური დამფუძნებელი ვარ. შევძლებ თქვენთან მუშაობას?
      a: დიახ. ჩვენი კლიენტების უმეტესობა არატექნიკური დამფუძნებლებია. პირველი კვირა თქვენს იდეას მარტივი ენით კონკრეტულ scope-ად აქცევს, ხოლო ყოველკვირეული დემოები გაკონტროლებთ პროცესს კოდის კითხვის გარეშე.
    q9:
      q: რა მოხდება, თუ მოთხოვნები პროექტის შუაში შეიცვლება?
      a: მცირე ცვლილებები ფიქსირებულ scope-ში ჯდება. დიდი ცვლილებები ფორმდება გამჭვირვალე, ფიქსირებული ფასის change request-ით. ვთანხმდებით განხორციელებამდე, ამიტომ ბიუჯეტი სიურპრიზებს არ გიმზადებთ.
    q10:
      q: სად მდებარეობთ და მუშაობთ თუ არა საერთაშორისო კლიენტებთან?
      a: Relux Works LLC რეგისტრირებულია სომხეთში და დისტანციურად მუშაობს დამფუძნებლებთან მთელ მსოფლიოში, აშშ-სა და ევროკავშირის ჩათვლით. ხელშეკრულებები ინგლისურად, ინვოისები USD-ში, async კომუნიკაცია.
