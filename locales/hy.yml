services:
  title: Ինչ ենք անում
  subtitle: Ստեղծում ենք պրոդուկտներ AI-first մոտեցմամբ
  product:
    title: Պրոդուկտների զարգացում
    description: Հավելվածների լիարժեք զարգացում՝ կոնցեպտից մինչև թողարկում։ Մոբայլ, վեբ և կросս-պլատֆորմ լուծումներ՝ երկարաժամկետ օգտագործման համար։
  agents:
    title: AI և ագենտային ինժեներիա
    description: AI-ագենտները՝ որպես հիմնական ինժեներական ուժ։ Նախագծում ենք, կառուցում և օրկեստրացնում ինքնավար ագենտային համակարգեր իրական խնդիրների համար։
  architecture:
    title: Ճարտարապետություն և խորհրդատվություն
    description: Flux/Redux մոտեցմամբ կանխատեսելի state management։ Type-safe, մոդուլային ճարտարապետություններ՝ Swift-ի համար և ոչ միայն։

ecosystem:
  title: Relux էկոհամակարգ
  subtitle: Բաց, մոդուլային, agent-first գործիքներ Swift մշակողների համար
  description: State container-ների, middleware-ի և developer tool-ների աճող էկոհամակարգ՝ հիմնված type-safe և կանխատեսելի տվյալների հոսքի վրա։ Ստեղծված է Swift-ի հետ միասին զարգանալու և բնականորեն ինտեգրվելու ագենտային մշակման մեջ։
  cta: Դիտել GitHub-ում
  features:
    state:
      title: State կոնտեյներներ
      description: Կանխատեսելի, type-safe state management՝ ստեղծված ժամանակակից Swift-ի համար
    middleware:
      title: Middleware
      description: Կոմպոզիցիոն middleware շերտ՝ side effects-ի, լոգավորման և ագենտների ինտեգրացիայի համար
    tools:
      title: Developer գործիքներ
      description: Debugging, time-travel և inspection գործիքներ Relux-ով աշխատող հավելվածների համար

portfolio:
  title: Պորտֆոլիո
  subtitle: Պրոդուկտներ, որոնք ստեղծել և թողարկել ենք
  tnl:
    title: "T&L \u2013 Learn Foreign Words"
    description: "Կրթական հավելված՝ բառապաշար սովորելու համար՝ պատկերների, ձայնի և տեքստի միջոցով։ Աջակցում է 7 լեզու։ Մրցանակակիր (Children's Technology Review 2013)։ Մշակող — Ivan Oparin։"
    badge: App Store
  tundra:
    title: Tundra Clans
    description: Թայլերով ռազմավարական խաղ։ Այժմ բետա փուլում է։
    badge: TestFlight

