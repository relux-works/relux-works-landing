      f1: Stripe / Paddle, բաժանորդագրություններ և billing
      f2: App Store և Google Play վճարումների կարգավորում, բանկային տվյալներ և հարկային ձևեր
      f3: Invoice-ներ և եկամտի հաշվետվություն
      f4: Հրապարակում մեր ՍՊԸ-ի տակ՝ եկամտի պայմանագրային փոխանցմամբ — եթե սեփական իրավաբանական անձ դեռ վաղ է
    rescue:
      title: Vibe-coded նախագծերի փրկություն և ագենտային ռելսեր
      description: Պրոտոտիպը հավաքե՞լ եք Lovable-ով, Cursor-ով, Bolt-ով կամ v0-ով։ Վերցնում ենք այն և հասցնում production մակարդակի։
      f1: Սկզբում կոդի աուդիտ և թեստեր ընթացիկ վարքագծի շուրջ
      f2: Անցում մասշտաբավորվող ճարտարապետության — type-safe, մոդուլային, փաստաթղթավորված
      f3: Ագենտային մշակման ռելսեր — Claude Code workflow՝ senior ինժեներների ռևյուով
      f4: Ձեր ռոադմեփը շարունակում է առաջ գնալ միգրացիայի ընթացքում
    scale:
      title: Տեխնիկական ղեկավարում և մասշտաբավորում
      description: Senior թիմ, որը պատասխանատու է ճարտարապետության և ենթակառուցվածքի համար ձեր աճի հետ։
      f1: Fractional CTO — ռոադմեփ, ճարտարապետական որոշումներ, օգնություն հավաքագրման հարցում
      f2: Ենթակառուցվածք՝ մասշտաբավորվող հարյուր հազարավոր օգտատերերի
      f3: Load testing, observability, autoscaling, ծախսերի վերահսկում
      f4: Անվտանգություն, համապատասխանություն և ինցիդենտների արձագանքման պրակտիկաներ
  faq:
    title: Հաճախ տրվող հարցեր
    q1:
      q: Կարո՞ղ եք հրապարակել մեր հավելվածը ձեր App Store և Google Play հաշիվների տակ։
      a: Այո։ Երկու մոդել — կամ ստեղծում ենք ձեր սեփական Apple Developer և Google Play Console հաշիվները (ներառյալ DUNS-ը և ընկերության վերիֆիկացիան) և վարում դրանք ձեր փոխարեն, կամ հրապարակում ենք Relux Works-ի հաշիվների տակ՝ պայմանագրով, որը երաշխավորում է հավելվածի, տվյալների և եկամտի փոխանցումը ձեզ ցանկացած պահի։
    q2:
      q: Վերցնո՞ւմ եք վճարումները, բանկերը և վճարումների ստացումը։
      a: Այո, ամբողջությամբ։ Մերչանտ հաշիվներ (Stripe, Paddle), բաժանորդագրային billing, App Store և Google Play վճարումների կարգավորում, բանկային տվյալներ և հարկային ձևեր, invoice-ներ և հաշվետվություն։ Եթե իրավաբանական անձ դեռ չունեք՝ կարող ենք եկամուտը անցկացնել մեր ընկերության միջոցով թափանցիկ պայմանագրով, մինչև գրանցվեք։
    q3:
      q: Հավելվածը գրվել է «vibe coding»-ով Lovable-ում, Cursor-ում կամ Bolt-ում։ Կվերցնե՞ք այն։
      a: Այո — դա մեր vibe-code rescue ծառայությունն է։ Անում ենք կոդի աուդիտ, ընթացիկ վարքագիծը պատում թեստերով, ապա տեղափոխում մասշտաբավորվող type-safe ճարտարապետության և ագենտային մշակման ռելսերի վրա — Claude Code workflow՝ senior ինժեներների ռևյուով։ Պրոդուկտը շարունակում է թողարկվել միգրացիայի ընթացքում։
    q4:
      q: Կկարողանա՞ք մասշտաբավորել հավելվածը հարյուր հազարավոր օգտատերերի։
      a: Այո։ Load testing, պրոֆիլավորում և նեղ տեղերի վերակառուցում — տվյալների բազայի և քեշավորման ռազմավարություն, autoscaling ենթակառուցվածք, observability (լոգեր, մետրիկներ, ալերտներ) և ծախսերի վերահսկում, որպեսզի հաշիվը աճի ավելի դանդաղ, քան օգտատերերի թիվը։
    q5:
      q: Տրամադրո՞ւմ եք մշտական տեխնիկական ղեկավարում։
      a: Այո — fractional CTO։ Պատասխանատու ենք ճարտարապետական որոշումների, տեխնիկական ռոադմեփի, կոդի որակի և անվտանգության պրակտիկաների համար, օգնում ենք հարցազրույց անցկացնել ձեր ապագա ինժեներների հետ։ Senior ղեկավարում՝ առանց full-time CTO վարձելու։
    q6:
      q: Ինչպե՞ս է սա գնագոյացվում։
      a: Օպերացիոն աշխատանքը (փաբլիշինգ, վճարումներ, ղեկավարում, մասշտաբավորում) ընթանում է ամսական retainer-ով՝ ձեր փուլին համապատասխան։ Միանվագ նախագծերը — vibe-coded կոդի փրկություն կամ ենթակառուցվածքի կապիտալ վերակառուցում — գնահատվում են ֆիքսված գնով, ինչպես մեր MVP մշակումը։
    q7:
      q: Ո՞ւմ են պատկանում հաշիվները, կոդը և եկամուտը։
      a: Ձեզ։ Ձեր անունով ստեղծված հաշիվները ձերն են առաջին օրվանից։ Եթե հրապարակում կամ եկամուտ ենք անցկացնում մեր ընկերության միջոցով — պայմանագիրը երաշխավորում է հավելվածի, ելակետային կոդի, տվյալների և կուտակված եկամտի լիարժեք փոխանցումը ըստ պահանջի։
    q8:
      q: Խրվել ենք App Store ռևյուում։ Կօգնե՞ք։
      a: Այո — ռևյուի մերժումները մեզ համար սովորական աշխատանք են։ Ախտորոշում ենք պատճառը, ուղղում համապատասխանության խնդիրները (գաղտնիություն, entitlements, մետատվյալներ), շփվում App Review-ի հետ և անհրաժեշտության դեպքում պահանջում expedited review։
