  product:
    title: Պրոդուկտների զարգացում
    description: Հավելվածների լիարժեք զարգացում՝ կոնցեպտից մինչև թողարկում։ Մոբայլ, վեբ և կросս-պլատֆորմ լուծումներ՝ երկարաժամկետ օգտագործման համար։
  agents:
    title: AI և ագենտային ինժեներիա
