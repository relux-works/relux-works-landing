mvp:
  meta:
    title: "AI MVP Development — Fixed Price $20k–$50k, 4–8 Weeks | Relux Works"
    description: "Fixed-price AI MVP development for startup founders: packages at $20k, $35k, and $50k, delivery in 4–8 weeks, 100% IP and source code ownership, QA, security review, and 30 days of post-launch support included."
  hero:
    badge: AI MVP Studio
    title: AI MVP Development for Startup Founders
    subtitle: Fixed price. 4–8 weeks from kickoff to launch. You own 100% of the source code.
    intro: Relux Works is an AI-native development studio — a vibe coding agency where senior engineers build with Claude Code and Cursor. AI-assisted development gives you agency-grade quality at startup speed — production code, not a no-code prototype.
    cta_primary: Get a fixed-price quote
    cta_secondary: See pricing
  pricing:
    title: MVP Pricing — Fixed Packages
    subtitle: Transparent fixed pricing. No hourly billing, no scope creep, no surprises.
    per_project: fixed price
    featured: Most popular
    sprint:
      name: MVP Sprint
      price: "$20,000"
      duration: 4 weeks
      description: Validate one core idea fast. One platform — web (Next.js) or iOS (Swift).
      f1: Core user flow + authentication
      f2: One AI-powered feature (Claude API or similar)
      f3: Payment-ready architecture (Stripe)
      f4: QA, security review, deployment
    standard:
      name: MVP Standard
      price: "$35,000"
      duration: 6 weeks
      description: A complete product for first paying users. Web or mobile, with admin and analytics.
      f1: Everything in MVP Sprint
      f2: Payments, subscriptions, and billing flows
      f3: Admin dashboard + product analytics
      f4: Third-party integrations (CRM, email, webhooks)
    plus:
      name: MVP Plus
      price: "$50,000"
      duration: 8 weeks
      description: Web + mobile together, or a deeper AI product with agentic workflows.
      f1: Everything in MVP Standard
      f2: Web + iOS, or complex AI agent pipelines
      f3: Extended security review and load testing
      f4: 60 days of post-launch support
    note: Every package includes 100% IP and source code ownership, QA, a security review, and post-launch support. Larger scope? We quote it fixed too.
  included:
    title: What every package includes
    i1:
      title: 100% IP & source code ownership
      description: All code lives in your GitHub organization from day one. Full IP transfer in the contract — no licenses, no lock-in.
    i2:
      title: QA & automated testing
      description: Test suites, CI pipelines, and manual QA passes before every release.
    i3:
      title: Security review
      description: Secrets management, dependency audit, and an OWASP-based security checklist before launch.
    i4:
      title: Post-launch support
      description: 30 days of bug fixes and stabilization after launch are included (60 days on MVP Plus).
    i5:
      title: Weekly demos
      description: A working build every week. You see progress, not status reports.
    i6:
      title: Launch & deployment
      description: App Store submission or production web deployment — included, not an extra.
  process:
    title: From idea to launch in 4–8 weeks
    w1:
      title: Week 1 — Scope & architecture
      description: We turn your idea into a fixed scope — user flows, data model, architecture, and a week-by-week plan you sign off on.
    w2:
      title: Weeks 2–3 — Build
      description: Senior engineers build with AI-assisted development (Claude Code, Cursor). Working software demoed every week.
    w3:
      title: Weeks 4–6 — Integrate & harden
      description: Payments, AI features, integrations. QA, security review, performance passes.
    w4:
      title: Launch — and 30 days beyond
      description: App Store or production deploy, monitoring, and 30 days of included post-launch support.
  stack:
    title: "Build style: AI-assisted, production-grade"
    description: We are a vibe coding studio in the literal sense — Claude Code and Cursor are part of the team, and senior engineers review every line. You get the speed of AI-assisted development with the quality of production code — type-safe Swift for iOS, Next.js/TypeScript for web, Claude API for AI features. No no-code lock-in — a codebase your future in-house team will thank you for.
    t1: Claude Code
    t2: Cursor
    t3: Swift / iOS
    t4: Next.js / TypeScript
    t5: Claude API
    t6: PostgreSQL / Supabase
  faq:
    title: Frequently asked questions
    q1:
      q: How much does MVP development cost at Relux Works?
      a: We work on fixed-price packages — MVP Sprint at $20,000 (4 weeks), MVP Standard at $35,000 (6 weeks), and MVP Plus at $50,000 (8 weeks). The price is agreed before we start and does not change unless you change the scope.
    q2:
      q: How long does it take to build an MVP?
      a: 4 to 8 weeks depending on the package. Week 1 is scope and architecture, then weekly working demos until launch. AI-assisted development is what makes this timeline realistic without cutting corners.
    q3:
      q: Who owns the source code and IP?
      a: You do — 100%. The repository is created in your GitHub organization on day one, and the contract assigns all IP to you. No licenses back to us, no vendor lock-in.
    q4:
      q: What does "vibe coding" or AI-assisted development mean in practice?
      a: Our engineers build with Claude Code and Cursor — AI agents write a large share of the code, while senior engineers design the architecture and review everything. That is how we deliver agency-grade MVPs several times faster than traditional teams.
    q5:
      q: Is this no-code like Bubble or Lovable, or real production code?
      a: Real production code — Swift for iOS, Next.js/TypeScript for web. No-code tools are great for prototypes, but they hit scaling and ownership limits fast. You get a codebase your future in-house team can take over directly.
    q6:
      q: What happens after launch?
      a: Every package includes post-launch support — 30 days of bug fixes and stabilization (60 days on MVP Plus). After that, most clients move to a monthly retainer for iteration, or hand the codebase to their own team — it is fully documented and theirs.
    q7:
      q: How do you handle QA and security?
      a: Every package ships with automated test suites, CI, and manual QA. Before launch we run a security review — secrets management, dependency audit, and an OWASP-based checklist. MVP Plus adds an extended security review and load testing.
    q8:
      q: I am a non-technical founder. Can I work with you?
      a: Yes — most of our clients are non-technical founders. Week 1 translates your idea into a concrete scope in plain language, and weekly demos keep you in control without reading code.
    q9:
      q: What if my requirements change mid-project?
      a: Small adjustments are absorbed into the fixed scope. Bigger changes get a transparent fixed-price change request — agreed before we build, so the budget never surprises you.
    q10:
      q: Where are you located and do you work with international clients?
      a: Relux Works LLC is registered in Armenia and works remotely with founders worldwide — US, EU, and beyond. Contracts in English, USD invoicing, async-friendly communication.
  cta:
    title: Tell us what you are building
    description: Send a couple of paragraphs about your idea — we reply within one business day with a recommended package and a fixed quote.
    button: Email ivan@relux.works

publishing:
  meta:
    title: "Full-Service App Publishing & Scaling — App Store, Google Play, Payments | Relux Works"
    description: "We take on the entire publishing operation — App Store and Google Play accounts, app review, banking and payouts, fractional CTO leadership, vibe-code rescue (Lovable, Cursor, Bolt), and scaling infrastructure to hundreds of thousands of users."
  hero:
    badge: Full-Service Studio
    title: We Publish, Operate, and Scale Your App
    subtitle: App Store and Google Play accounts, payments and payouts, technical leadership, and infrastructure that scales — all on us.
    intro: Shipping an MVP is half the job. The other half is operations — developer accounts, app review, banking and payout rails, monitoring, scaling, and someone senior owning the technical roadmap. Relux Works takes on all publishing responsibilities, so founders can stay on product and growth.
    cta_primary: Discuss your project
  offers:
    title: What we take on
    accounts:
      title: App Store & Google Play publishing
      description: We set up and operate the full release pipeline — under your accounts or ours.
      f1: Apple Developer & Google Play Console setup (DUNS, entity verification)
      f2: App review submissions, rejection handling, expedited reviews
      f3: Releases, phased rollouts, TestFlight and internal tracks
      f4: Store listings, screenshots, ASO basics
    payments:
      title: Payments, banking & payouts
      description: Money flows configured end to end — from checkout to your bank account.
      f1: Stripe / Paddle merchant setup, subscriptions and billing
      f2: App Store & Google Play payout configuration, banking and tax forms
      f3: Invoicing and revenue reporting
      f4: Publishing under our LLC with contractual revenue transfer — when you don't want to set up an entity yet
    rescue:
      title: Vibe-code rescue & agentic rails
      description: Built your prototype with Lovable, Cursor, Bolt, or v0? We take it over and make it production-grade.
      f1: Codebase audit + tests around current behavior first
      f2: Migration to a scalable architecture — type-safe, modular, documented
      f3: Agentic development rails — Claude Code-driven workflow with senior engineering review
      f4: Your roadmap keeps moving during the migration
    scale:
      title: Technical leadership & scaling
      description: A senior team that owns architecture and infrastructure as you grow.
      f1: Fractional CTO — roadmap, architecture decisions, hiring support
      f2: Infrastructure that scales to hundreds of thousands of users
      f3: Load testing, observability, autoscaling, cost control
      f4: Security, compliance, and incident response practices
  faq:
    title: Frequently asked questions
    q1:
      q: Can you publish our app under your App Store and Google Play accounts?
      a: Yes. Two models — we set up your own Apple Developer and Google Play Console accounts (including DUNS and entity verification) and operate them for you, or we publish under the Relux Works accounts with a contract that guarantees transfer of the app, data, and revenue to you at any time.
    q2:
      q: Can you handle payments, banking, and payouts?
      a: Yes — end to end. Merchant accounts (Stripe, Paddle), subscription billing, App Store and Google Play payout configuration, banking details and tax forms, invoicing and revenue reporting. If you don't have a legal entity yet, we can run revenue through ours under a transparent contract until you incorporate.
    q3:
      q: My app was vibe-coded with Lovable, Cursor, or Bolt. Can you take it over?
      a: Yes — that is our vibe-code rescue service. We audit the codebase, wrap the current behavior in tests, then migrate it to a scalable, type-safe architecture and onto agentic development rails — Claude Code-driven workflows with senior engineering review. Your product keeps shipping during the migration.
    q4:
      q: Can you scale our app to hundreds of thousands of users?
      a: Yes. We load-test, profile, and rebuild the bottlenecks — database and caching strategy, autoscaling infrastructure, observability (logs, metrics, alerts), and cost control so the bill grows slower than the user count.
    q5:
      q: Do you provide ongoing technical leadership?
      a: Yes — fractional CTO. We own architecture decisions, the technical roadmap, code quality, and security practices, and help interview your future in-house engineers. You get senior leadership without a full-time hire.
    q6:
      q: How is this priced?
      a: Operations work (publishing, payments, leadership, scaling) runs on a monthly retainer scoped to your stage. One-off projects — like a vibe-code rescue or an infrastructure overhaul — are quoted as fixed-price packages, the same model as our MVP development.
    q7:
      q: Who owns the accounts, code, and revenue?
      a: You do. Accounts created in your name are yours from day one. If we publish or process revenue under our entity, the contract guarantees full transfer of the app, source code, data, and accumulated revenue on request.
    q8:
      q: We're stuck in App Store review. Can you help?
      a: Yes — review rejections are routine for us. We diagnose the rejection reason, fix compliance issues (privacy, entitlements, metadata), communicate with App Review, and request expedited review when justified.
  cta:
    title: Hand over the operations
    description: Tell us where your product is today — prototype, stuck in review, or buckling under load. We reply within one business day with a plan.
    button: Email ivan@relux.works

