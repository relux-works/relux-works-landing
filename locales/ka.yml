      f2: ინფრასტრუქტურა, რომელიც ასობით ათას მომხმარებელზე მასშტაბირდება
      f3: Load testing, observability, autoscaling, ხარჯების კონტროლი
      f4: უსაფრთხოება, შესაბამისობა და ინციდენტებზე რეაგირების პრაქტიკები
  faq:
    title: ხშირად დასმული კითხვები
    q1:
      q: შეგიძლიათ ჩვენი აპლიკაცია თქვენი App Store და Google Play ანგარიშებით გამოაქვეყნოთ?
      a: დიახ. ორი მოდელი — ან ვქმნით თქვენს საკუთარ Apple Developer და Google Play Console ანგარიშებს (DUNS-ისა და კომპანიის ვერიფიკაციის ჩათვლით) და ვმართავთ მათ თქვენ მაგივრად, ან ვაქვეყნებთ Relux Works-ის ანგარიშებით ხელშეკრულებით, რომელიც ნებისმიერ მომენტში გიგარანტიებთ აპლიკაციის, მონაცემებისა და შემოსავლის გადმოცემას.
    q2:
      q: იღებთ თუ არა გადახდებს, ბანკებსა და ანაზღაურებებს?
      a: დიახ, მთლიანად. მერჩანტ ანგარიშები (Stripe, Paddle), გამოწერების billing, App Store და Google Play ანაზღაურებების გამართვა, საბანკო რეკვიზიტები და საგადასახადო ფორმები, ინვოისები და ანგარიშგება. თუ იურიდიული პირი ჯერ არ გაქვთ — შემოსავალი შეგვიძლია ჩვენი კომპანიის გავლით გავატაროთ გამჭვირვალე ხელშეკრულებით, სანამ დარეგისტრირდებით.
    q3:
      q: აპლიკაცია „vibe coding"-ით დაიწერა Lovable-ში, Cursor-ში ან Bolt-ში. ჩაიბარებთ მას?
      a: დიახ — ეს ჩვენი vibe-code rescue სერვისია. ვაკეთებთ კოდის აუდიტს, მიმდინარე ქცევას ტესტებით ვფარავთ, შემდეგ გადაგვყავს მასშტაბირებად type-safe არქიტექტურასა და აგენტური დეველოპმენტის რელსებზე — Claude Code workflow senior ინჟინრების რევიუთი. პროდუქტი მიგრაციის დროსაც აგრძელებს გამოშვებას.
    q4:
      q: შეძლებთ ჩვენი აპლიკაციის მასშტაბირებას ასობით ათას მომხმარებელზე?
      a: დიახ. Load testing, პროფილირება და ვიწრო ადგილების გადაწყობა — მონაცემთა ბაზისა და ქეშირების სტრატეგია, autoscaling ინფრასტრუქტურა, observability (ლოგები, მეტრიკები, ალერტები) და ხარჯების კონტროლი, რომ ანგარიში მომხმარებლების რაოდენობაზე ნელა იზრდებოდეს.
    q5:
      q: უზრუნველყოფთ მუდმივ ტექნიკურ ხელმძღვანელობას?
      a: დიახ — fractional CTO. ვაგებთ პასუხს არქიტექტურულ გადაწყვეტილებებზე, ტექნიკურ როადმაპზე, კოდის ხარისხსა და უსაფრთხოების პრაქტიკებზე, ვეხმარებით თქვენი მომავალი ინჟინრების გასაუბრებაში. Senior ხელმძღვანელობა full-time CTO-ს დაქირავების გარეშე.
    q6:
      q: როგორ ფასდება ეს?
      a: ოპერაციული სამუშაო (ფაბლიშინგი, გადახდები, ხელმძღვანელობა, მასშტაბირება) ყოველთვიური retainer-ით მიდის, თქვენს ეტაპზე მორგებული. ერთჯერადი პროექტები — vibe-coded კოდის გადარჩენა ან ინფრასტრუქტურის კაპიტალური გადაწყობა — ფიქსირებული ფასით ფასდება, ისევე როგორც ჩვენი MVP შემუშავება.
    q7:
      q: ვის ეკუთვნის ანგარიშები, კოდი და შემოსავალი?
      a: თქვენ. თქვენი სახელით შექმნილი ანგარიშები პირველი დღიდან თქვენია. თუ ვაქვეყნებთ ან შემოსავალს ჩვენი კომპანიის გავლით ვატარებთ — ხელშეკრულება გიგარანტიებთ აპლიკაციის, წყარო კოდის, მონაცემებისა და დაგროვილი შემოსავლის სრულ გადმოცემას მოთხოვნისთანავე.
    q8:
      q: App Store-ის რევიუში გავიჭედეთ. დაგვეხმარებით?
      a: დიახ — რევიუს უარყოფები ჩვენთვის რუტინაა. ვადგენთ მიზეზს, ვასწორებთ შესაბამისობის პრობლემებს (კონფიდენციალურობა, entitlements, მეტამონაცემები), ვურთიერთობთ App Review-სთან და საჭიროების შემთხვევაში ვითხოვთ expedited review-ს.
  cta:
    title: გადმოგვაბარეთ ოპერაციული სამუშაო
    description: მოგვიყევით, სად არის თქვენი პროდუქტი ახლა — პროტოტიპი, რევიუში გაჭედილი თუ დატვირთვის ქვეშ მყოფი. ერთ სამუშაო დღეში გიპასუხებთ გეგმით.
    button: მისწერეთ ivan@relux.works-ს

