  title: Экосистема Relux
  subtitle: Открытые, модульные, agent-first инструменты для Swift-разработчиков
  description: Растущая экосистема контейнеров состояния, middleware и инструментов разработки на основе типобезопасного, предсказуемого потока данных. Создана для эволюции вместе со Swift и естественной интеграции с агентной разработкой.
  cta: Смотреть на GitHub
  features:
    state:
      title: Контейнеры состояния
      description: Предсказуемое, типобезопасное управление состоянием для современного Swift
    middleware:
      title: Middleware
      description: Компонуемый слой middleware для side effects, логирования и интеграции агентов
    tools:
      title: Инструменты разработчика
      description: Отладка, time-travel и инспекция для приложений на Relux

