    description: "ვიღებთ მთელ ფაბლიშინგ სტეკს: App Store და Google Play ანგარიშები, გადახდები და ანაზღაურებები, vibe-coded პროექტების გადარჩენა და ინფრასტრუქტურა, რომელიც ასობით ათას მომხმარებელზე მასშტაბირდება."
  mvp_banner:
