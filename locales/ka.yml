    subtitle: ფიქსირებული ფასი. 4–8 კვირა სტარტიდან გაშვებამდე. წყარო კოდის 100% თქვენია.
    intro: "Relux Works არის AI-native შემუშავების სტუდია და vibe coding სააგენტო, სადაც senior ინჟინრები მუშაობენ Claude Code-სა და Cursor-თან ერთად. AI-ით მხარდაჭერილი შემუშავება გაძლევთ სააგენტოს ხარისხს სტარტაპის სიჩქარით: გაშვებისას იღებთ production კოდს, რომელიც რეალური მომხმარებლებისთვის მზადაა."
