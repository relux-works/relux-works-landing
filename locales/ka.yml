mvp:
  meta:
    title: "AI MVP შემუშავება: ფიქსირებული ფასი $20k–$50k, 4–8 კვირა | Relux Works"
    description: "MVP შემუშავება ფიქსირებული ფასით სტარტაპის დამფუძნებლებისთვის: პაკეტები $20k, $35k და $50k, ვადა 4–8 კვირა, IP-ისა და წყარო კოდის 100% საკუთრება, QA, უსაფრთხოების შემოწმება და გაშვების შემდეგ 30 დღის მხარდაჭერა."
  hero:
