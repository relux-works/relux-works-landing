  offers:
    title: Ինչ ենք վերցնում մեզ վրա
    accounts:
      title: Հրապարակում App Store-ում և Google Play-ում
      description: Կարգավորում և վարում ենք ամբողջ release pipeline-ը՝ ձեր հաշիվների տակ կամ մեր։
      f1: Apple Developer և Google Play Console կարգավորում (DUNS, ընկերության վերիֆիկացիա)
      f2: Ռևյուի սաբմիթներ, մերժումների հետ աշխատանք, expedited review
      f3: Թողարկումներ, փուլային rollout-ներ, TestFlight և ներքին track-եր
      f4: Ստորի էջեր, սքրինշոթներ, բազային ASO
    payments:
