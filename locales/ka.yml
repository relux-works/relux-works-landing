services:
  title: რას ვაკეთებთ
  subtitle: ვქმნით პროდუქტებს AI-first მიდგომით
  product:
    title: პროდუქტის განვითარება
    description: აპლიკაციების სრული ციკლის განვითარება — კონცეფციიდან გაშვებამდე. მობილური, ვებ და კროს-პლატფორმული გადაწყვეტები.
  agents:
    title: AI და აგენტური ინჟინერია
    description: AI-აგენტები როგორც ძირითადი საინჟინრო ძალა. ავტონომიური აგენტური სისტემების დაპროექტება, შექმნა და ორკესტრაცია.
  architecture:
    title: არქიტექტურა და კონსალტინგი
    description: Flux/Redux პატერნებზე დაფუძნებული პროგნოზირებადი state management. Type-safe, მოდულარული არქიტექტურები Swift-ისთვის.

ecosystem:
  title: Relux ეკოსისტემა
  subtitle: ღია, მოდულარული, agent-first ინსტრუმენტები Swift დეველოპერებისთვის
  description: State container-ების, middleware-ისა და დეველოპერ ინსტრუმენტების მზარდი ეკოსისტემა, type-safe და პროგნოზირებად მონაცემთა ნაკადზე აგებული.
  cta: GitHub-ზე ნახვა
  features:
    state:
      title: State Containers
      description: პროგნოზირებადი, type-safe state management თანამედროვე Swift-ისთვის
    middleware:
      title: Middleware
      description: კომპოზირებადი middleware ფენა side effects, ლოგირებისა და აგენტების ინტეგრაციისთვის
    tools:
      title: დეველოპერ ინსტრუმენტები
      description: Debugging, time-travel და ინსპექციის ინსტრუმენტები Relux აპლიკაციებისთვის

portfolio:
  title: პორტფოლიო
  subtitle: პროდუქტები, რომლებიც შევქმენით და გამოვუშვით
  tnl:
    title: "T&L \u2013 Learn Foreign Words"
    description: საგანმანათლებლო აპლიკაცია ლექსიკის სწავლისთვის ვიზუალური, აუდიო და ტექსტური მასალით. 7 ენის მხარდაჭერა. Children's Technology Review 2013-ის გამარჯვებული. დეველოპერი — Ivan Oparin.
    badge: App Store
  tundra:
    title: Tundra Clans
    description: ფილაზე დაფუძნებული სტრატეგიული თამაში. ამჟამად ბეტა ტესტირებაში.
    badge: TestFlight
  waio:
    title: Waio Recorder
    description: macOS აპი, რომელიც აუდიოს იწერს ნებისმიერი აპიდან, მათ შორის Zoom და Google Meet შეხვედრებიდან.
    badge: TestFlight

