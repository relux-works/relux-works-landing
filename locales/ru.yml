    cta_secondary: Как это работает
  symptoms:
    title: Знакомо?
    s1: Каждая новая фича ломает две старые. Кодбаза сопротивляется.
    s2: AI-ассистент днями крутится вокруг одного бага и не может починить.
    s3: На демо работало, а на реальных пользователях и данных развалилось.
    s4: "API-ключи наружу, проверок доступа нет: безопасность никто не проектировал."
    s5: Попробовали нанять разработчика, и он отказался брать этот код.
  services:
    title: Что мы делаем
    audit:
      title: Rescue-аудит
      description: Неделя, фиксированная цена. Полная картина до того, как кто-то тронет код.
      f1: Ревью архитектуры, безопасности, производительности и покрытия тестами
      f2: "Приоритизированный план: что критично, что подождёт, что переписать"
      f3: "Честный вердикт: стабилизировать, рефакторить итеративно или пересобрать (и сколько стоит каждый путь)"
    bugs:
      title: Сложные баги
      description: Берём баги, на которых AI-инструменты сдались.
      f1: Race conditions, порча состояния, целостность данных, сломанные интеграции
      f2: Воспроизводим, изолируем, чиним и закрепляем регрессионным тестом, чтобы не вернулось
      f3: Поддержка при инцидентах в проде, когда всё горит
    refactor:
      title: Де-вайбкодинг (рефакторинг до production)
      description: Итеративная миграция на архитектуру, которая выдержит реальный бизнес.
      f1: Сначала тесты вокруг текущего поведения, чтобы ничего не ломалось молча
      f2: Типобезопасная модульная архитектура, CI/CD, observability, гигиена секретов
      f3: Ваш роадмап продолжает релизиться во время миграции
    rails:
      title: Агентские рельсы
      description: Сохраняем скорость ИИ и добавляем инженерную дисциплину.
      f1: Claude Code-воркфлоу с тестами и CI-гейтами
      f2: Ревью senior-инженеров на каждом изменении
      f3: Передача вашей команде, или продолжаем вести сами (см. паблишинг)
  pricing:
    title: Цены
    subtitle: Аудит — фиксированная цена. Всё дальнейшее оценивается фиксом по итогам аудита, без бесконечной почасовки.
    audit:
      name: Rescue-аудит
      price: "$3,000"
      duration: 1 неделя
      description: Полный отчёт по кодбазе + приоритизированный план + честный вердикт «рефакторить или пересобрать».
    sprint:
      name: Стабилизационный спринт
      price: от $10,000
      duration: 2–3 недели
      description: Починены критичные баги, закрыты дыры безопасности, тесты вокруг ключевых флоу.
    full:
      name: Полный де-вайбкодинг
      price: фикс по итогам аудита
      duration: обычно $15k–40k
      description: Миграция на production-архитектуру + агентские рельсы, пока продукт продолжает релизиться.
    note: Стоимость аудита засчитывается в последующую работу. Если честный ответ «дешевле пересобрать», так и скажем и предложим фиксированные MVP-пакеты.
  process:
    title: Как проходит спасение
    w1:
      title: "Аудит: неделя 1"
      description: Читаем код, запускаем приложение, картируем архитектуру, сканируем безопасность и отдаём отчёт с приоритизированным планом.
    w2:
      title: Стабилизация
      description: Сначала критичные баги и дыры безопасности, затем тесты вокруг поведения, на которое полагаются пользователи. Здесь останавливается кровотечение.
    w3:
      title: Рефакторинг
      description: "Итеративный де-вайбкодинг: модуль за модулем, под тестами, без заморозки фичевого роадмапа."
    w4:
      title: Рельсы и передача
      description: Настраиваем агентский воркфлоу (Claude Code + senior-ревью), пишем документацию, онбордим вашу команду. Или продолжаем вести сами.
  faq:
    title: Частые вопросы
    q1:
      q: Почините приложение, собранное в Lovable, Bolt, Cursor или v0?
      a: Да, это ровно то, чем занимается vibe-code rescue. Работаем с типичным выводом AI-билдеров (Next.js/React, React Native, Node, Python, Supabase, Firebase) и с нативными iOS (Swift) и Android (Kotlin). Забираем репозиторий и доводим до production-качества.
    q2:
      q: ИИ зациклился и не может починить мой баг. Вы сможете?
      a: "Да. Сложные баги — ядро этого сервиса: race conditions, порча состояния, целостность данных, сломанные интеграции. Senior-инженеры воспроизводят баг, изолируют причину, чинят и фиксируют регрессионным тестом. AI-инструменты зацикливаются, потому что латают симптом вместо поиска первопричины."
    q3:
      q: Вы всё перепишете с нуля?
      a: "По умолчанию нет. Оборачиваем текущее поведение тестами и рефакторим итеративно: это дешевле и безопаснее. Если аудит покажет, что пересборка реально дешевле, скажем прямо и предложим фикс на пересборку. В любом случае вы получаете честную математику."
    q4:
      q: Можно продолжать выпускать фичи во время чистки?
      a: Да, это конструктивное ограничение нашего процесса. Стабилизация и рефакторинг идут модуль за модулем под тестами, пока ваш фичевый роадмап продолжает ехать.
    q5:
      q: Сколько стоит починить навайбкоженное приложение?
      a: Rescue-аудит стоит $3,000 и занимает неделю. Стабилизационный спринт — от $10,000. Полная миграция де-вайбкодинга оценивается фиксом по итогам аудита, обычно $15,000–40,000 в зависимости от размера и состояния кодбазы. Стоимость аудита засчитывается в последующую работу.
    q6:
      q: AI-код правда небезопасен?
      a: "Часто да. Типичные находки: API-ключи в репозитории или на клиенте, отсутствие проверок авторизации на эндпоинтах, инъекции в запросах, PII в логах, открытый CORS. Аудит включает security-ревью по чек-листу на основе OWASP, а стабилизационный спринт закрывает критичные дыры."
    q7:
      q: Что мы получаем в итоге?
      a: Кодбазу с тестами, CI/CD, документацией и типобезопасной модульной архитектурой, плюс агентские рельсы, чтобы AI-разработка сохранила скорость при инженерной дисциплине. 100% кода ваши; передаём вашей команде или продолжаем вести по ретейнеру.
    q8:
      q: Что такое «агентские рельсы»?
      a: "Структурированный AI-воркфлоу разработки: Claude Code внутри тестов, CI-гейтов и ревью senior-инженеров. Вы сохраняете скорость, которая собрала прототип, и добавляете дисциплину, которой не хватало."
    q9:
      q: Подписываете NDA и как получаете доступ к коду?
      a: Да, подписываем NDA. Доступ через ваш репозиторий с минимальными правами. Код не покидает вашу собственность, всё написанное нами с первого дня лежит в вашем репо.
  cta:
    title: Пришлите кодбазу
    description: Дайте доступ к репозиторию (или просто опишите симптомы), и мы ответим в течение рабочего дня со слотом на аудит и фиксированной ценой.
    button: Написать на ivan@relux.works

